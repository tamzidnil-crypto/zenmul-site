<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing | Zenmul</title>
<meta name="description" content="Simple pricing. Priced to pay for itself. One setup fee, one flat monthly. No per-task billing, no surprises.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#34D399;--bg:#07090a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--muted:#6b7280;--muted2:#9ca3af}
html{scroll-behavior:smooth}
body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;cursor:none}
#cursor{position:fixed;width:12px;height:12px;background:var(--green);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s}
#cursor-glow{position:fixed;width:380px;height:380px;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(52,211,153,0.07) 0%,transparent 65%)}
#bg-icons-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.bg-icon{position:absolute;color:rgba(52,211,153,.16);animation:iconFloat var(--dur,9s) ease-in-out infinite;animation-delay:var(--dl,0s)}
.bg-icon svg{width:100%;height:100%;display:block}
@keyframes iconFloat{0%,100%{transform:translateY(0px);opacity:.14}50%{transform:translateY(-18px);opacity:.26}}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(7,9,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-weight:700;font-size:17px}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;transition:color .2s}
.nav-links a:hover{color:#fff}
.btn-nav{background:var(--green);color:#061210;font-weight:700;font-size:14px;padding:9px 20px;border-radius:8px;text-decoration:none}
.page-hero{padding:140px 48px 80px;max-width:1300px;margin:0 auto;text-align:center}
.eyebrow{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.18em;color:var(--green);text-transform:uppercase;margin-bottom:20px;opacity:0;animation:fadeUp .7s ease forwards .1s}
.page-hero h1{font-size:clamp(36px,5vw,60px);font-weight:800;letter-spacing:-1.5px;margin-bottom:20px;opacity:0;animation:fadeUp .8s ease forwards .3s}
.page-hero p{font-size:17px;color:rgba(255,255,255,.55);max-width:520px;margin:0 auto;line-height:1.72;opacity:0;animation:fadeUp .7s ease forwards .5s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}from{opacity:0;transform:translateY(20px)}}
.section{padding:0 48px 96px;max-width:1300px;margin:0 auto}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;position:relative;transition:transform .25s,border-color .25s,box-shadow .25s}
.price-card:hover{transform:translateY(-6px);border-color:rgba(52,211,153,.25);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.price-card.featured{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.04)}
.featured-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--green);color:#061210;font-size:12px;font-weight:700;padding:4px 16px;border-radius:20px;white-space:nowrap}
.price-tier{font-size:13px;font-weight:600;color:var(--green);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.price-tag{margin-bottom:8px}
.price-tag .amount{font-size:44px;font-weight:900;letter-spacing:-1.5px}
.price-tag .period{font-size:14px;color:var(--muted2);margin-left:4px}
.price-monthly{font-size:14px;color:var(--muted2);margin-bottom:28px}
.price-monthly strong{color:rgba(255,255,255,.7)}
.price-divider{height:1px;background:var(--border);margin-bottom:28px}
.price-features{list-style:none;display:flex;flex-direction:column;gap:14px;margin-bottom:36px}
.price-features li{display:flex;gap:12px;font-size:14px;color:rgba(255,255,255,.65);line-height:1.5}
.check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.price-note{font-size:13px;color:var(--muted);text-align:center;margin-bottom:64px}
.btn-primary{background:var(--green);color:#061210;font-weight:700;font-size:15px;padding:14px 28px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:opacity .2s,transform .2s;width:100%;justify-content:center}
.btn-primary:hover{opacity:.88;transform:translateY(-2px)}
.btn-outline-full{background:transparent;color:#fff;font-weight:600;font-size:15px;padding:14px 28px;border-radius:10px;border:1px solid var(--border);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;width:100%;transition:border-color .2s}
.btn-outline-full:hover{border-color:rgba(52,211,153,.4)}
.faq-section{max-width:780px;margin:0 auto;padding:0 48px 96px}
.faq-title{font-size:clamp(28px,3vw,40px);font-weight:800;letter-spacing:-1px;margin-bottom:40px}
.faq-item{border-bottom:1px solid var(--border)}
.faq-item:first-of-type{border-top:1px solid var(--border)}
.faq-btn{width:100%;background:none;border:none;display:flex;justify-content:space-between;align-items:center;padding:22px 0;cursor:none;color:#fff;font-size:16px;font-weight:500;text-align:left;gap:16px;transition:color .2s}
.faq-btn:hover{color:var(--green)}
.faq-icon{flex-shrink:0;width:20px;height:20px;transition:transform .28s}
.faq-item.open .faq-icon{transform:rotate(180deg)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s;font-size:14px;color:rgba(255,255,255,.52);line-height:1.78}
.faq-item.open .faq-answer{max-height:200px;padding-bottom:22px}
.cta-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;padding:72px 48px;text-align:center;max-width:680px;margin:0 auto 96px}
.cta-box h2{font-size:clamp(26px,3vw,38px);font-weight:800;letter-spacing:-.8px;margin-bottom:20px}
.cta-box p{color:rgba(255,255,255,.52);font-size:15px;line-height:1.72;margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto}
.cta-box .btn-primary{width:auto;display:inline-flex}
footer{border-top:1px solid var(--border);padding:48px;max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.footer-links-row{display:flex;gap:28px;list-style:none}
.footer-links-row a{font-size:13px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s}
.footer-links-row a:hover{color:#fff}
.footer-copy{font-size:13px;color:var(--muted)}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.rd1{transition-delay:.08s}.rd2{transition-delay:.16s}.rd3{transition-delay:.24s}
@media(max-width:900px){nav{padding:0 20px}.pricing-grid{grid-template-columns:1fr}.section,.faq-section{padding-left:20px;padding-right:20px}.page-hero{padding:120px 20px 60px}footer{padding:32px 20px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}body{cursor:auto}#cursor,#cursor-glow{display:none}}

</style>

<style>
/* ═══ ZARA WIDGET ═══ */
#zenmul-toggle,#zenmul-panel,#zenmul-panel *{box-sizing:border-box;}
#zenmul-toggle{position:fixed;bottom:28px;right:28px;width:56px;height:56px;border-radius:50%;background:#34D399;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10000;transition:transform .2s ease,box-shadow .2s ease;box-shadow:0 4px 24px rgba(52,211,153,0.35);}
#zenmul-toggle:hover{transform:scale(1.08);box-shadow:0 0 0 10px rgba(52,211,153,0.12),0 4px 24px rgba(52,211,153,0.35);}
#zenmul-toggle::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(52,211,153,0.4);animation:zm-pulse 2.4s ease-out infinite;}
@keyframes zm-pulse{0%{transform:scale(1);opacity:1;}70%{transform:scale(1.55);opacity:0;}100%{transform:scale(1.55);opacity:0;}}
#zenmul-panel{position:fixed;bottom:96px;right:28px;width:360px;max-height:560px;background:#0E1214;border:1px solid #1E2529;border-radius:14px;display:flex;flex-direction:column;z-index:9999;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.7),0 0 0 1px rgba(52,211,153,0.07);transform:translateY(18px) scale(0.96);opacity:0;pointer-events:none;transition:transform .22s ease,opacity .22s ease;}
#zenmul-panel.zm-open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
.zm-hdr{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid #1E2529;background:#07090A;flex-shrink:0;}
.zm-av{width:34px;height:34px;border-radius:50%;background:#34D399;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.zm-hdr-txt{flex:1;min-width:0;}
.zm-hdr-txt strong{display:block;font-size:13px;font-weight:600;color:#E8EDEB;letter-spacing:.01em;font-family:'Inter',system-ui,sans-serif;}
.zm-hdr-txt em{display:flex;align-items:center;gap:5px;font-size:11px;color:#34D399;font-style:normal;font-family:'Inter',system-ui,sans-serif;}
.zm-dot{width:6px;height:6px;border-radius:50%;background:#34D399;flex-shrink:0;animation:zmDotPulse 2s ease-in-out infinite;}
@keyframes zmDotPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.zm-x{background:none;border:none;color:#6B7C75;cursor:pointer;padding:5px;border-radius:6px;transition:color .15s;display:flex;align-items:center;line-height:1;}
.zm-x:hover{color:#E8EDEB;}
.zm-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;scrollbar-width:thin;scrollbar-color:#1E2529 transparent;}
.zm-msgs::-webkit-scrollbar{width:3px;}
.zm-msgs::-webkit-scrollbar-thumb{background:#1E2529;border-radius:4px;}
.zm-msg{display:flex;flex-direction:column;max-width:90%;}
.zm-msg.zm-u{align-self:flex-end;align-items:flex-end;}
.zm-msg.zm-a{align-self:flex-start;align-items:flex-start;}
.zm-bbl{padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;font-family:'Inter',system-ui,sans-serif;}
.zm-msg.zm-u .zm-bbl{background:#34D399;color:#07090A;font-weight:500;border-bottom-right-radius:3px;}
.zm-msg.zm-a .zm-bbl{background:#151A1D;color:#E8EDEB;border:1px solid #1E2529;border-bottom-left-radius:3px;}
.zm-typing{display:flex;align-items:center;gap:5px;padding:10px 14px;background:#151A1D;border:1px solid #1E2529;border-radius:12px;border-bottom-left-radius:3px;width:fit-content;}
.zm-typing span{width:6px;height:6px;border-radius:50%;background:#34D399;animation:zm-bounce 1.2s ease-in-out infinite;}
.zm-typing span:nth-child(2){animation-delay:.2s;}
.zm-typing span:nth-child(3){animation-delay:.4s;}
@keyframes zm-bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
.zm-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 11px;flex-shrink:0;}
.zm-chip{background:transparent;border:1px solid #1E2529;color:#6B7C75;font-size:11.5px;padding:5px 11px;border-radius:20px;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:border-color .15s,color .15s;white-space:nowrap;}
.zm-chip:hover{border-color:#34D399;color:#34D399;}
.zm-inp-row{display:flex;align-items:flex-end;gap:8px;padding:11px 13px;border-top:1px solid #1E2529;background:#07090A;flex-shrink:0;}
#zm-inp{flex:1;background:#151A1D;border:1px solid #1E2529;border-radius:10px;padding:9px 12px;font-size:13px;color:#E8EDEB;font-family:'Inter',system-ui,sans-serif;resize:none;outline:none;line-height:1.5;max-height:100px;transition:border-color .15s;scrollbar-width:none;}
#zm-inp::-webkit-scrollbar{display:none;}
#zm-inp::placeholder{color:#6B7C75;}
#zm-inp:focus{border-color:#1a6e4e;}
#zm-send-btn{width:36px;height:36px;border-radius:8px;background:#34D399;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;}
#zm-send-btn:hover{background:#2bc887;}
#zm-send-btn:active{transform:scale(0.92);}
#zm-send-btn:disabled{background:#1E2529;cursor:not-allowed;}
.zm-ft{text-align:center;font-size:10px;color:#6B7C75;padding:5px 0 9px;letter-spacing:.02em;font-family:'Inter',system-ui,sans-serif;flex-shrink:0;}
@media(max-width:420px){#zenmul-panel{right:10px;left:10px;width:auto;bottom:86px;}#zenmul-toggle{right:14px;bottom:18px;}}


<script>
(function(){
  const cur=document.getElementById('cursor')||document.createElement('div');
  const glw=document.getElementById('cursor-glow')||document.createElement('div');
  cur.id='cursor'; glw.id='cursor-glow';
  if(!document.getElementById('cursor')){document.body.appendChild(cur);document.body.appendChild(glw);}
  const layer=document.getElementById('bg-icons-layer');
  const st=document.createElement('style');
  st.textContent='body{cursor:none}#cursor{position:fixed;width:14px;height:14px;background:#34D399;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .08s,height .08s,background .08s,border .08s,box-shadow .08s}#cursor-glow{position:fixed;width:420px;height:420px;border-radius:50%;pointer-events:none;z-index:9997;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(52,211,153,0.08) 0%,transparent 65%)}#bg-icons-layer{position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden}.bg-icon{position:absolute;color:rgba(52,211,153,0.15);transition:color .25s,filter .25s,transform .25s;animation:bgFloat var(--dur,9s) ease-in-out infinite;animation-delay:var(--dl,0s)}.bg-icon svg{width:100%;height:100%;display:block}.bg-icon.glowing{color:rgba(52,211,153,0.95)!important;filter:drop-shadow(0 0 8px rgba(52,211,153,0.9)) drop-shadow(0 0 20px rgba(52,211,153,0.5));transform:scale(1.35)!important;animation-play-state:paused}@keyframes bgFloat{0%,100%{transform:translateY(0px) rotate(0deg)}25%{transform:translateY(-14px) rotate(3deg)}50%{transform:translateY(-22px) rotate(-2deg)}75%{transform:translateY(-10px) rotate(4deg)}}';
  document.head.appendChild(st);
  const ICONS=['<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="5" cy="12" r="2.5"/><circle cx="19" cy="6" r="2.5"/><circle cx="19" cy="18" r="2.5"/><line x1="7.5" y1="12" x2="16.5" y2="6.8"/><line x1="7.5" y1="12" x2="16.5" y2="17.2"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/><line x1="9" y1="17" x2="15" y2="17"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="22 12 18 12 15 21 9   pos.forEach((p,i)=>{const d=document.createElement('div');d.className='bg-icon';const sz=20+(i%5)*4;d.style.cssText=`left:${p.l};top:${p.t};width:${sz}px;height:${sz}px;--dur:${7+i%7}s;--dl:-${(i*0.45)%9}s`;d.innerHTML=ICONS[i%ICONS.length];layer.appendChild(d)});
  let mx=0,my=0,gx=0,gy=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';document.querySelectorAll('.bg-icon').forEach(ic=>{const r=ic.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;ic.classList.toggle('glowing',Math.sqrt((mx-cx)**2+(my-cy)**2)<55)})});
  (function anim(){gx+=(mx-gx)*0.15;gy+=(my-gy)*0.15;glw.style.left=gx+'px';glw.style.top=gy+'px';requestAnimationFrame(anim)})();
  document.querySelectorAll('a,button,input,select,textarea').forEach(el=>{el.addEventListener('mouseenter',()=>{cur.style.cssText='position:fixed;width:28px;height:28px;background:transparent;border:2px solid #34D399;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(52,211,153,0.6);transition:width .08s,height .08s,background .08s,border .08s,box-shadow .08s;left:'+mx+'px;top:'+my+'px'});el.addEventListener('mouseleave',()=>{cur.style.cssText='position:fixed;width:14px;height:14px;background:#34D399;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .08s,height .08s,background .08s,border .08s,box-shadow .08s;left:'+mx+'px;top:'+my+'px'})});
})();
</script>

     ZENMUL AI CHAT WIDGET
     ═══════════════════════════════════════════ -->
<!-- Toggle button -->


<!-- ZARA AI WIDGET -->
<button id="zenmul-toggle" aria-label="Open Zara AI Assistant">
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
    <path d="M6 7H20L13.5 14" stroke="#07090A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 19H6L12.5 12" stroke="#07090A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
<div id="zenmul-panel" role="dialog" aria-label="Zara by Zenmul">
  <div class="zm-hdr">
    <div class="zm-av">
      <svg width="17" height="17" viewBox="0 0 26 26" fill="none">
        <path d="M6 7H20L13.5 14" stroke="#07090A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 19H6L12.5 12" stroke="#07090A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="zm-hdr-txt">
      <strong>Zara by Zenmul</strong>
      <em><span class="zm-dot"></span>Ask me anything</em>
    </div>
    <button class="zm-x" id="zm-close-btn" aria-label="Close">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="zm-msgs" id="zm-msgs">
    <div class="zm-msg zm-a">
      <div class="zm-bbl">Hey, I'm Zara. I help businesses figure out what to automate and what it saves them.

What does your business do, and what's eating the most time in your week right now?</div>
    </div>
  </div>
  <div class="zm-chips" id="zm-chips">
    <button class="zm-chip">I run a salon</button>
    <button class="zm-chip">I'm losing leads</button>
    <button class="zm-chip">Calculate my losses</button>
    <button class="zm-chip">What would this cost?</button>
  </div>
  <div class="zm-inp-row">
    <textarea id="zm-inp" rows="1" placeholder="Ask about our services…" maxlength="500"></textarea>
    <button id="zm-send-btn" aria-label="Send">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z" stroke="#07090A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="zm-ft">Powered by Zenmul AI</div>
</div>

<script>
(function(){
  var hist=[],busy=false;
  var tog=document.getElementById('zenmul-toggle'),pan=document.getElementById('zenmul-panel'),cls=document.getElementById('zm-close-btn'),msgs=document.getElementById('zm-msgs'),inp=document.getElementById('zm-inp'),snd=document.getElementById('zm-send-btn'),chips=document.getElementById('zm-chips');
  tog.addEventListener('click',function(){pan.classList.toggle('zm-open');if(pan.classList.contains('zm-open'))inp.focus();});
  cls.addEventListener('click',function(){pan.classList.remove('zm-open');});
  chips.addEventListener('click',function(e){if(e.target.classList.contains('zm-chip')){send(e.target.textContent);chips.style.display='none';}});
  inp.addEventListener('input',function(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!busy)send(inp.value.trim());}});
  snd.addEventListener('click',function(){if(!busy)send(inp.value.trim());});
  function bubble(role,text){var w=document.createElement('div');w.className='zm-msg '+(role==='user'?'zm-u':'zm-a');var b=document.createElement('div');b.className='zm-bbl';b.textContent=text;w.appendChild(b);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;return b;}
  function showTyping(){var w=document.createElement('div');w.className='zm-msg zm-a';w.id='zm-typ';var t=document.createElement('div');t.className='zm-typing';t.innerHTML='<span></span><span></span><span></span>';w.appendChild(t);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;}
  function hideTyping(){var t=document.getElementById('zm-typ');if(t)t.remove();}
  function send(txt){
    if(!txt||busy)return;
    chips.style.display='none';
    bubble('user',txt);
    inp.value='';inp.style.height='auto';
    hist.push({role:'user',content:txt});
    busy=true;snd.disabled=true;showTyping();
    fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:hist})})
    .then(function(r){return r.json();})
    .then(function(d){
      hideTyping();
      var reply=d.reply||"Sorry, I didn't catch that. Try again or email nazmul@zenmul.com.";
      bubble('assistant',reply);
      hist.push({role:'assistant',content:reply});
    })
    .catch(function(){
      hideTyping();
      bubble('assistant','Something went wrong. Please email nazmul@zenmul.com and we will get back to you.');
    })
    .finally(function(){busy=false;snd.disabled=false;inp.focus();});
  }
})();




<script>
/* ═══ ZENMUL MOTION GRAPHICS — SAFE VERSION ═══ */
(function(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  /* 1. FLOATING ORBS */
  var orbDefs=[
    {w:500,h:500,top:'5vh',  left:'-8vw', dur:'18s',dx1:'5vw', dy1:'8vh', dx2:'-3vw',dy2:'14vh'},
    {w:350,h:350,top:'40vh', left:'72vw', dur:'22s',dx1:'-6vw',dy1:'-5vh',dx2:'3vw', dy2:'9vh'},
    {w:280,h:280,top:'75vh', left:'15vw', dur:'16s',dx1:'4vw', dy1:'-7vh',dx2:'-2vw',dy2:'4vh'}
  ];
  orbDefs.forEach(function(o){
    var el=document.createElement('div');
    el.style.cssText='position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);width:'+o.w+'px;height:'+o.h+'px;top:'+o.top+';left:'+o.left+';background:radial-gradient(circle,rgba(52,211,153,0.13) 0%,transparent 70%);opacity:0.08;animation:zenmulOrb '+o.dur+' ease-in-out infinite;';
    el.setAttribute('data-orb','1');
    document.body.appendChild(el);
    var keyframes='@keyframes zenmulOrb{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate('+o.dx1+','+o.dy1+') scale(1.08);}66%{transform:translate('+o.dx2+','+o.dy2+') scale(0.96);}}';
    if(!document.getElementById('zenmul-orb-style')){
      var st=document.createElement('style');
      st.id='zenmul-orb-style';
      st.textContent=keyframes;
      document.head.appendChild(st);
    }
  });

  /* 2. PARTICLE CANVAS — hero only */
  var hero=document.querySelector('.hero');
  if(hero){
    var canvas=document.createElement('canvas');
    canvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0.28;';
    hero.style.position='relative';
    hero.insertBefore(canvas,hero.firstChild);
    /* make hero children sit above canvas */
    Array.prototype.forEach.call(hero.children,function(el){
      if(el!==canvas){el.style.position='relative';el.style.zIndex='2';}
    });
    var ctx=canvas.getContext('2d'),W=0,H=0,pts=[];
    function resize(){W=canvas.width=hero.offsetWidth;H=canvas.height=hero.offsetHeight;}
    resize();
    window.addEventListener('resize',resize,{passive:true});
    for(var i=0;i<18;i++) pts.push({x:Math.random()*1200,y:Math.random()*600,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,p:Math.random()*Math.PI*2});
    var pkts=[];
    setInterval(function(){
      if(pkts.length<12){
        var a=Math.floor(Math.random()*pts.length),b=Math.floor(Math.random()*pts.length);
        if(a!==b) pkts.push({f:pts[a],t:pts[b],p:0,s:.006+Math.random()*.005});
      }
    },1000);
    function draw(){
      ctx.clearRect(0,0,W,H);
      pts.forEach(function(p){
        p.x+=p.vx; p.y+=p.vy; p.p+=.018;
        if(p.x<0||p.x>W) p.vx*=-1;
        if(p.y<0||p.y>H) p.vy*=-1;
        var a=0.35+Math.sin(p.p)*0.25;
        ctx.beginPath();ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
        ctx.fillStyle='rgba(52,211,153,'+a+')';ctx.fill();
      });
      for(var i=0;i<pts.length;i++){
        for(var j=i+1;j<pts.length;j++){
          var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
          if(d<155){
            ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
            ctx.strokeStyle='rgba(52,211,153,'+(1-d/155)*.13+')';ctx.lineWidth=0.5;ctx.stroke();
          }
        }
      }
      pkts.forEach(function(pk,idx){
        pk.p+=pk.s;
        if(pk.p>1){pkts.splice(idx,1);return;}
        var x=pk.f.x+(pk.t.x-pk.f.x)*pk.p,y=pk.f.y+(pk.t.y-pk.f.y)*pk.p;
        ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);
        ctx.fillStyle='rgba(52,211,153,'+(0.85*(1-pk.p))+')';
        ctx.shadowColor='#34D399';ctx.shadowBlur=5;ctx.fill();ctx.shadowBlur=0;
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  /* 3. TOOL CARD / INT CARD STAGGER ON SCROLL */
  var staggerCards=document.querySelectorAll('.tool-card,.int-card,.principle-card');
  if(staggerCards.length){
    var scObs=new IntersectionObserver(function(entries){
      var visible=[];
      entries.forEach(function(e){if(e.isIntersecting)visible.push(e.target);});
      visible.forEach(function(el,i){
        setTimeout(function(){
          el.style.opacity='1';el.style.transform='translateY(0)';
        },i*55);
        scObs.unobserve(el);
      });
    },{threshold:0.08});
    staggerCards.forEach(function(c){
      c.style.opacity='0';c.style.transform='translateY(18px)';
      c.style.transition='opacity .45s ease,transform .45s ease';
      scObs.observe(c);
    });
  }

  /* 4. COMPARE TABLE YES/NO POP */
  var tables=document.querySelectorAll('.comp-table');
  if(tables.length){
    var tObs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(!e.isIntersecting) return;
        e.target.querySelectorAll('.yes,.no,.maybe').forEach(function(el,i){
          el.style.opacity='0';el.style.transform='scale(0)';el.style.display='inline-block';
          setTimeout(function(){
            el.style.transition='opacity .25s,transform .25s';
            el.style.opacity='1';el.style.transform='scale(1)';
          },i*35+80);
        });
        tObs.unobserve(e.target);
      });
    },{threshold:0.1});
    tables.forEach(function(t){tObs.observe(t);});
  }

  /* 5. SERVE CARD INNER GLOW */
  document.querySelectorAll('.serve-card').forEach(function(card){
    card.addEventListener('mouseenter',function(){
      card.style.boxShadow='0 0 0 1px rgba(52,211,153,0.3),0 20px 50px rgba(52,211,153,0.08)';
    });
    card.addEventListener('mouseleave',function(){
      card.style.boxShadow='';
    });
  });

  /* 6. PRICE CARD HOVER LIFT */
  document.querySelectorAll('.price-card').forEach(function(card){
    card.addEventListener('mouseenter',function(){
      card.style.transform='translateY(-8px)';
      card.style.transition='transform .3s cubic-bezier(0.34,1.56,0.64,1),box-shadow .3s';
      card.style.boxShadow='0 24px 64px rgba(0,0,0,0.5),0 0 40px rgba(52,211,153,0.06)';
    });
    card.addEventListener('mouseleave',function(){
      card.style.transform='';
      card.style.boxShadow='';
    });
  });

  /* 7. WORKFLOW CARD SHIMMER ON HOVER */
  document.querySelectorAll('.workflow-card').forEach(function(card){
    card.style.overflow='hidden';
    card.style.position='relative';
  });

  /* 8. RESULT DOT STAGGER in case-studies */
  document.querySelectorAll('.case-card').forEach(function(card){
    var dotsObs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(!e.isIntersecting) return;
        e.target.querySelectorAll('.result-dot').forEach(function(dot,i){
          dot.style.opacity='0';dot.style.transform='scale(0)';
          setTimeout(function(){
            dot.style.transition='opacity .3s,transform .3s cubic-bezier(0.34,1.56,0.64,1)';
            dot.style.opacity='1';dot.style.transform='scale(1)';
          },i*80+100);
        });
        dotsObs.unobserve(e.target);
      });
    },{threshold:0.15});
    dotsObs.observe(card);
  });

})();
</script>

</body>
</html>
