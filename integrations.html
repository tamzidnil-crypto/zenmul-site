<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#34D399;--bg:#07090a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--muted:#6b7280}
html{scroll-behavior:smooth}
body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;cursor:none}
#cursor{position:fixed;width:14px;height:14px;background:var(--green);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .08s,height .08s}
#cursor-glow{position:fixed;width:420px;height:420px;border-radius:50%;pointer-events:none;z-index:9997;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(52,211,153,0.07) 0%,transparent 65%)}
#bg-icons-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.bg-icon{position:absolute;color:rgba(52,211,153,.1);animation:bgFloat var(--dur,9s) ease-in-out infinite;animation-delay:var(--dl,0s)}
.bg-icon svg{width:100%;height:100%;display:block}
@keyframes bgFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-18px)}}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(7,9,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-weight:700;font-size:17px}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;transition:color .2s}
.nav-links a:hover{color:#fff}
.btn-nav{background:var(--green);color:#061210;font-weight:700;font-size:14px;padding:9px 20px;border-radius:8px;text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:.7}}
.page-hero{padding:140px 48px 64px;max-width:1300px;margin:0 auto;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.18em;color:var(--green);text-transform:uppercase;margin-bottom:20px;opacity:0;animation:fadeUp .7s ease forwards .1s}
.eyebrow-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s ease infinite}
.page-hero h1{font-size:clamp(36px,5vw,64px);font-weight:900;letter-spacing:-2px;margin-bottom:20px;opacity:0;animation:fadeUp .8s ease forwards .3s;line-height:1.05}
.page-hero h1 em{font-style:normal;color:var(--green)}
.page-hero p{font-size:17px;color:rgba(255,255,255,.5);max-width:520px;margin:0 auto;line-height:1.72;opacity:0;animation:fadeUp .7s ease forwards .5s}
.section{max-width:1300px;margin:0 auto;padding:0 48px 80px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--green);text-transform:uppercase;margin-bottom:16px}
.section-title{font-size:clamp(22px,3vw,36px);font-weight:800;letter-spacing:-.8px;margin-bottom:12px}
.section-sub{font-size:15px;color:rgba(255,255,255,.45);max-width:520px;margin-bottom:40px;line-height:1.65}
.int-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.int-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;transition:border-color .25s,transform .25s,box-shadow .25s}
.int-card:hover{border-color:rgba(52,211,153,.25);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.int-icon{width:44px;height:44px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:18px;transition:box-shadow .25s}
.int-card:hover .int-icon{box-shadow:0 0 16px rgba(52,211,153,.25)}
.int-name{font-size:15px;font-weight:700;margin-bottom:6px}
.int-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:14px}
.int-uses{list-style:none;display:flex;flex-direction:column;gap:5px}
.int-uses li{font-size:12px;color:rgba(255,255,255,.35);display:flex;gap:7px;align-items:flex-start}
.int-uses li::before{content:"→";color:var(--green);flex-shrink:0;font-size:11px;margin-top:1px}
.int-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:6px;margin-top:14px}
.int-badge.core{background:rgba(52,211,153,.12);color:rgba(52,211,153,.9);border:1px solid rgba(52,211,153,.2)}
.int-badge.comm{background:rgba(99,102,241,.12);color:rgba(165,180,252,.9);border:1px solid rgba(99,102,241,.2)}
.int-badge.data{background:rgba(251,191,36,.08);color:rgba(251,191,36,.8);border:1px solid rgba(251,191,36,.15)}
.int-badge.enrich{background:rgba(236,72,153,.08);color:rgba(251,182,206,.8);border:1px solid rgba(236,72,153,.15)}
.int-badge.crm{background:rgba(59,130,246,.08);color:rgba(147,197,253,.8);border:1px solid rgba(59,130,246,.15)}
.divider{border:none;border-top:1px solid var(--border);margin:0 48px}
.cta-section{max-width:1300px;margin:0 auto;padding:64px 48px 96px}
.cta-box{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.2);border-radius:20px;padding:64px 48px;text-align:center}
.cta-box h2{font-size:clamp(26px,3vw,40px);font-weight:800;letter-spacing:-.8px;margin-bottom:16px}
.cta-box p{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:32px;max-width:440px;margin-left:auto;margin-right:auto}
.btn-primary{background:var(--green);color:#061210;font-weight:700;font-size:15px;padding:14px 28px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:opacity .2s,transform .2s;cursor:none}
.btn-primary:hover{opacity:.88;transform:translateY(-2px)}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:none}
.rd1{transition-delay:.06s}.rd2{transition-delay:.12s}.rd3{transition-delay:.18s}.rd4{transition-delay:.24s}.rd5{transition-delay:.30s}.rd6{transition-delay:.36s}
footer{border-top:1px solid var(--border);padding:40px 48px;max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-links-row{display:flex;gap:28px;list-style:none;flex-wrap:wrap}
.footer-links-row a{font-size:13px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s}
.footer-links-row a:hover{color:#fff}
.footer-copy{font-size:13px;color:var(--muted)}
@media(max-width:900px){nav{padding:0 20px}.nav-links{display:none}.page-hero,.section,.divider,.cta-section{padding-left:20px;padding-right:20px}footer{padding:32px 20px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}body{cursor:auto}#cursor,#cursor-glow{display:none}}

</style>

<script>
(function(){

  const ICONS=['<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="5" cy="12" r="2.5"/><circle cx="19" cy="6" r="2.5"/><circle cx="19" cy="18" r="2.5"/><line x1="7.5" y1="12" x2="16.5" y2="6.8"/><line x1="7.5" y1="12" x2="16.5" y2="17.2"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>'];
  const pos=[{l:'3%',t:'12vh'},{l:'5%',t:'35vh'},{l:'2%',t:'58vh'},{l:'4%',t:'80vh'},{l:'3%',t:'105vh'},{l:'5%',t:'130vh'},{l:'93%',t:'18vh'},{l:'91%',t:'42vh'},{l:'94%',t:'65vh'},{l:'92%',t:'88vh'},{l:'90%',t:'112vh'},{l:'93%',t:'138vh'}];
  pos.forEach((p,i)=>{const d=document.createElement('div');d.className='bg-icon';const sz=22+(i%4)*4;d.style.cssText=`left:${p.l};top:${p.t};width:${sz}px;height:${sz}px;--dur:${8+i%5}s;--dl:-${(i*0.55)%8}s`;d.innerHTML=ICONS[i%ICONS.length];layer.appendChild(d)});
  let mx=0,my=0,gx=0,gy=0;

<script>
(function(){
  var hist=[],busy=false;
  var tog=document.getElementById('zenmul-toggle'),pan=document.getElementById('zenmul-panel'),cls=document.getElementById('zm-close-btn'),msgs=document.getElementById('zm-msgs'),inp=document.getElementById('zm-inp'),snd=document.getElementById('zm-send-btn'),chips=document.getElementById('zm-chips');
  tog.addEventListener('click',function(){pan.classList.toggle('zm-open');if(pan.classList.contains('zm-open'))inp.focus();});
  cls.addEventListener('click',function(){pan.classList.remove('zm-open');});
  chips.addEventListener('click',function(e){if(e.target.classList.contains('zm-chip')){send(e.target.textContent);chips.style.display='none';}});
  inp.addEventListener('input',function(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!busy)send(inp.value.trim());}});
  snd.addEventListener('click',function(){if(!busy)send(inp.value.trim());});
  function bubble(role,text){var w=document.createElement('div');w.className='zm-msg '+(role==='user'?'zm-u':'zm-a');var b=document.createElement('div');b.className='zm-bbl';b.textContent=text;w.appendChild(b);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;return b;}
  function showTyping(){var w=document.createElement('div');w.className='zm-msg zm-a';w.id='zm-typ';var t=document.createElement('div');t.className='zm-typing';t.innerHTML='<span></span><span></span><span></span>';w.appendChild(t);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;}
  function hideTyping(){var t=document.getElementById('zm-typ');if(t)t.remove();}
  function send(txt){
    if(!txt||busy)return;
    chips.style.display='none';
    bubble('user',txt);
    inp.value='';inp.style.height='auto';
    hist.push({role:'user',content:txt});
    busy=true;snd.disabled=true;showTyping();
    fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:hist})})
    .then(function(r){return r.json();})
    .then(function(d){
      hideTyping();
      var reply=d.reply||"Sorry, I didn't catch that. Try again or email nazmul@zenmul.com.";
      bubble('assistant',reply);
      hist.push({role:'assistant',content:reply});
    })
    .catch(function(){
      hideTyping();
      bubble('assistant','Something went wrong. Please email nazmul@zenmul.com and we will get back to you.');
    })
    .finally(function(){busy=false;snd.disabled=false;inp.focus();});
  }
})();

    {w:500,h:500,top:'5vh',  left:'-8vw', dur:'18s',dx1:'5vw', dy1:'8vh', dx2:'-3vw',dy2:'14vh'},
    {w:350,h:350,top:'40vh', left:'72vw', dur:'22s',dx1:'-6vw',dy1:'-5vh',dx2:'3vw', dy2:'9vh'},
    {w:280,h:280,top:'75vh', left:'15vw', dur:'16s',dx1:'4vw', dy1:'-7vh',dx2:'-2vw',dy2:'4vh'}
  ];
  orbDefs.forEach(function(o){
    var el=document.createElement('div');
    el.style.cssText='position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);width:'+o.w+'px;height:'+o.h+'px;top:'+o.top+';left:'+o.left+';background:radial-gradient(circle,rgba(52,211,153,0.13) 0%,transparent 70%);opacity:0.08;animation:zenmulOrb '+o.dur+' ease-in-out infinite;';
    el.setAttribute('data-orb','1');
    document.body.appendChild(el);
    var keyframes='@keyframes zenmulOrb{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate('+o.dx1+','+o.dy1+') scale(1.08);}66%{transform:translate('+o.dx2+','+o.dy2+') scale(0.96);}}';
    if(!document.getElementById('zenmul-orb-style')){
      var st=document.createElement('style');
      st.id='zenmul-orb-style';
      st.textContent=keyframes;
      document.head.appendChild(st);
    }
  });

  /* 2. PARTICLE CANVAS — hero only */
  var hero=document.querySelector('.hero');
  if(hero){
    var canvas=document.createElement('canvas');
    canvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0.28;';
    hero.style.position='relative';
    hero.insertBefore(canvas,hero.firstChild);
    /* make hero children sit above canvas */
    Array.prototype.forEach.call(hero.children,function(el){
      if(el!==canvas){el.style.position='relative';el.style.zIndex='2';}
    });
    var ctx=canvas.getContext('2d'),W=0,H=0,pts=[];
    function resize(){W=canvas.width=hero.offsetWidth;H=canvas.height=hero.offsetHeight;}
    resize();
    window.addEventListener('resize',resize,{passive:true});
    for(var i=0;i<18;i++) pts.push({x:Math.random()*1200,y:Math.random()*600,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,p:Math.random()*Math.PI*2});
    var pkts=[];
    setInterval(function(){
      if(pkts.length<12){
        var a=Math.floor(Math.random()*pts.length),b=Math.floor(Math.random()*pts.length);
        if(a!==b) pkts.push({f:pts[a],t:pts[b],p:0,s:.006+Math.random()*.005});
      }
    },1000);
    function draw(){
      ctx.clearRect(0,0,W,H);
      pts.forEach(function(p){
        p.x+=p.vx; p.y+=p.vy; p.p+=.018;
        if(p.x<0||p.x>W) p.vx*=-1;
        if(p.y<0||p.y>H) p.vy*=-1;
        var a=0.35+Math.sin(p.p)*0.25;
        ctx.beginPath();ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
        ctx.fillStyle='rgba(52,211,153,'+a+')';ctx.fill();
      });
      for(var i=0;i<pts.length;i++){
        for(var j=i+1;j<pts.length;j++){
          var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
          if(d<155){
            ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
            ctx.strokeStyle='rgba(52,211,153,'+(1-d/155)*.13+')';ctx.lineWidth=0.5;ctx.stroke();
          }
        }
      }
      pkts.forEach(function(pk,idx){
        pk.p+=pk.s;
        if(pk.p>1){pkts.splice(idx,1);return;}
        var x=pk.f.x+(pk.t.x-pk.f.x)*pk.p,y=pk.f.y+(pk.t.y-pk.f.y)*pk.p;
        ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);
        ctx.fillStyle='rgba(52,211,153,'+(0.85*(1-pk.p))+')';
        ctx.shadowColor='#34D399';ctx.shadowBlur=5;ctx.fill();ctx.shadowBlur=0;
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  /* 3. TOOL CARD / INT CARD STAGGER ON SCROLL */
  var staggerCards=document.querySelectorAll('.tool-card,.int-card,.principle-card');
  if(staggerCards.length){
    var scObs=new IntersectionObserver(function(entries){
      var visible=[];
      entries.forEach(function(e){if(e.isIntersecting)visible.push(e.target);});
      visible.forEach(function(el,i){
        setTimeout(function(){
          el.style.opacity='1';el.style.transform='translateY(0)';
        },i*55);
        scObs.unobserve(el);
      });
    },{threshold:0.08});
    staggerCards.forEach(function(c){
      c.style.opacity='0';c.style.transform='translateY(18px)';
      c.style.transition='opacity .45s ease,transform .45s ease';
      scObs.observe(c);
    });
  }

  /* 4. COMPARE TABLE YES/NO POP */
  var tables=document.querySelectorAll('.comp-table');
  if(tables.length){
    var tObs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(!e.isIntersecting) return;
        e.target.querySelectorAll('.yes,.no,.maybe').forEach(function(el,i){
          el.style.opacity='0';el.style.transform='scale(0)';el.style.display='inline-block';
          setTimeout(function(){
            el.style.transition='opacity .25s,transform .25s';
            el.style.opacity='1';el.style.transform='scale(1)';
          },i*35+80);
        });
        tObs.unobserve(e.target);
      });
    },{threshold:0.1});
    tables.forEach(function(t){tObs.observe(t);});
  }

  /* 5. SERVE CARD INNER GLOW */
  document.querySelectorAll('.serve-card').forEach(function(card){
    card.addEventListener('mouseenter',function(){
      card.style.boxShadow='0 0 0 1px rgba(52,211,153,0.3),0 20px 50px rgba(52,211,153,0.08)';
    });
    card.addEventListener('mouseleave',function(){
      card.style.boxShadow='';
    });
  });

  /* 6. PRICE CARD HOVER LIFT */
  document.querySelectorAll('.price-card').forEach(function(card){
    card.addEventListener('mouseenter',function(){
      card.style.transform='translateY(-8px)';
      card.style.transition='transform .3s cubic-bezier(0.34,1.56,0.64,1),box-shadow .3s';
      card.style.boxShadow='0 24px 64px rgba(0,0,0,0.5),0 0 40px rgba(52,211,153,0.06)';
    });
    card.addEventListener('mouseleave',function(){
      card.style.transform='';
      card.style.boxShadow='';
    });
  });

  /* 7. WORKFLOW CARD SHIMMER ON HOVER */
  document.querySelectorAll('.workflow-card').forEach(function(card){
    card.style.overflow='hidden';
    card.style.position='relative';
  });

  /* 8. RESULT DOT STAGGER in case-studies */
  document.querySelectorAll('.case-card').forEach(function(card){
    var dotsObs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(!e.isIntersecting) return;
        e.target.querySelectorAll('.result-dot').forEach(function(dot,i){
          dot.style.opacity='0';dot.style.transform='scale(0)';
          setTimeout(function(){
            dot.style.transition='opacity .3s,transform .3s cubic-bezier(0.34,1.56,0.64,1)';
            dot.style.opacity='1';dot.style.transform='scale(1)';
          },i*80+100);
        });
        dotsObs.unobserve(e.target);
      });
    },{threshold:0.15});
    dotsObs.observe(card);
  });

})();
</script>

</body>
</html>
